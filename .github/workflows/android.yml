name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
  workflow_dispatch:

# Don't let rapid pushes pile up redundant runs (the emulator job is the pricey one): a newer
# commit on the same branch cancels the older in-flight run. Saves Actions minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: android

jobs:
  unit:
    name: Build + JVM unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        continue-on-error: true # setup-android@v3's sdkmanager flakes intermittently; the next step recovers
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Ensure SDK platform + licenses (resilient; retries the flaky sdkmanager)
        run: |
          sdkm="$(command -v sdkmanager || echo "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager")"
          yes | "$sdkm" --licenses >/dev/null 2>&1 || true
          for i in 1 2 3; do
            "$sdkm" "platform-tools" "platforms;android-37" && break
            echo "sdkmanager attempt $i failed; retrying in $((i * 5))s"; sleep $((i * 5))
          done || echo "android-37 not in the sdkmanager channel; AGP will auto-download"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3

      - name: Unit tests (no device, no hardware)
        run: ./gradlew :app:testDebugUnitTest :pencore:testDebugUnitTest :penble:testDebugUnitTest :premiumapi:testDebugUnitTest --stacktrace

      - name: Verify no telemetry (privacy guardrail — DESIGN.md hard rule)
        run: ./gradlew :app:verifyNoTelemetry --stacktrace

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace
      - name: Freemium variant builds (open-core gate)
        run: ./gradlew :app:assembleDebug -Pnibhaus.premium=false --stacktrace
      - name: Native libs are 16KB page-aligned (Android 15+ devices)
        run: |
          set -e
          APK=$(ls app/build/outputs/apk/debug/app-debug.apk)
          mkdir -p /tmp/apk && unzip -o -q "$APK" 'lib/*' -d /tmp/apk || { echo "no native libs"; exit 0; }
          bad=0
          # 16KB pages are a 64-bit-only requirement; 32-bit ABIs (armeabi-v7a, x86) stay 4KB by
          # design, so only validate arm64-v8a and x86_64 (else third-party 32-bit .so's false-fail,
          # e.g. ML Kit's libdigitalink.so).
          for so in $(find /tmp/apk/lib/arm64-v8a /tmp/apk/lib/x86_64 -name '*.so' 2>/dev/null); do
            align=$(readelf -lW "$so" | awk '/LOAD/ {print $NF}' | sort -u | head -1)
            case "$align" in
              0x4000|0x10000) ;;  # 16KB or 64KB aligned: OK
              *) echo "MISALIGNED ($align): $so"; bad=1 ;;
            esac
          done
          exit $bad

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-reports
          path: android/app/build/reports/tests/

  detekt:
    name: Detekt static analysis (report-only)
    runs-on: ubuntu-latest
    # Findings never gate CI: continue-on-error on the run step below, plus a per-module baseline
    # (config/detekt/baseline-*.xml) so existing findings don't even surface as new. This job exists
    # to publish the report artifact for browsing, not to block merges.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        continue-on-error: true # setup-android@v3's sdkmanager flakes intermittently; the next step recovers
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Ensure SDK platform + licenses (resilient; retries the flaky sdkmanager)
        run: |
          sdkm="$(command -v sdkmanager || echo "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager")"
          yes | "$sdkm" --licenses >/dev/null 2>&1 || true
          for i in 1 2 3; do
            "$sdkm" "platform-tools" "platforms;android-37" && break
            echo "sdkmanager attempt $i failed; retrying in $((i * 5))s"; sleep $((i * 5))
          done || echo "android-37 not in the sdkmanager channel; AGP will auto-download"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3

      - name: detekt
        continue-on-error: true
        run: ./gradlew detekt --continue --stacktrace

      - name: Upload detekt reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: detekt-reports
          path: android/*/build/reports/detekt/
          if-no-files-found: warn

  instrumented:
    name: Emulator instrumented tests
    runs-on: ubuntu-latest
    # Everything except the physical pen link: Room, lifecycle, BLE permission flow on a real
    # Android image. No pen is attached, so this never covers the LAMY GO/NO-GO.
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
        working-directory: .

      - name: Set up Android SDK
        continue-on-error: true # setup-android@v3's sdkmanager flakes intermittently; the next step recovers
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Ensure SDK platform + licenses (resilient; retries the flaky sdkmanager)
        run: |
          sdkm="$(command -v sdkmanager || echo "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager")"
          yes | "$sdkm" --licenses >/dev/null 2>&1 || true
          for i in 1 2 3; do
            "$sdkm" "platform-tools" "platforms;android-37" && break
            echo "sdkmanager attempt $i failed; retrying in $((i * 5))s"; sleep $((i * 5))
          done || echo "android-37 not in the sdkmanager channel; AGP will auto-download"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@ed408507eac070d1f99cc633dbcf757c94c7933a # v4.4.3

      - name: Instrumented tests on emulator
        # Report-only: emulator runs are flaky on CI and the pen link needs real hardware anyway.
        # Known gap to fix: the migration test doesn't wire the full Room 8->12 set (the app declares
        # them all via addMigrations, so this is a test-setup issue, not an app crash).
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          working-directory: android
          script: ./gradlew :app:connectedDebugAndroidTest --stacktrace

  semgrep:
    name: Semgrep SAST (report-only)
    runs-on: ubuntu-latest
    # Same philosophy as detekt above: publish findings, never gate. Runs the community rulesets
    # offline (no SEMGREP_APP_TOKEN); add the token later to upload results to the platform.
    container: semgrep/semgrep
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: semgrep scan
        continue-on-error: true
        run: semgrep scan --config auto --sarif --output semgrep.sarif || true
      - name: Upload semgrep report
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-report
          path: semgrep.sarif
